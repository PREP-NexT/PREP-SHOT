name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run fast unit tests
        run: |
          python -m unittest discover -s tests -p "test_schema_version.py" -v
          python -m unittest discover -s tests -p "test_optional_inputs.py" -v
          python -m unittest discover -s tests -p "test_utils.py" -v

      - name: Run end-to-end regression test
        # Slow (~150 s); only run on push to main to keep PR feedback fast.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python -m unittest discover -s tests -p "test_regression.py" -v
