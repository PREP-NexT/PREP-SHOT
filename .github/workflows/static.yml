name: Docs
on:
  push:
    branches: [main, v1.0.x]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Resolve version slug
        id: slug
        run: |
          case "${GITHUB_REF_NAME}" in
            main)   echo "slug=latest" >> "$GITHUB_OUTPUT" ;;
            v1.0.x) echo "slug=v1.0"   >> "$GITHUB_OUTPUT" ;;
            *)      echo "slug=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r ./doc/requirements.txt
          sudo apt-get update -qy
          sudo apt-get install -y pandoc

      - name: Sphinx build
        env:
          DOCS_VERSION_SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          cd doc
          make clean
          make html

      - name: Deploy version subdir
        if: github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./doc/build/html
          destination_dir: en/${{ steps.slug.outputs.slug }}
          keep_files: true
