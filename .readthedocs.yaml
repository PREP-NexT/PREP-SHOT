# Read the Docs build configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    # nbsphinx shells out to pandoc to convert notebook markdown to RST.
    - pandoc

sphinx:
  configuration: doc/source/conf.py
  # The conf.py emits a few INFO-level "missing reference target" warnings
  # for cross-page citations; turning fail_on_warning off keeps the build
  # green while we accept those.
  fail_on_warning: false

formats:
  # HTML zip download alongside the live HTML site.
  # PDF / EPUB intentionally disabled (we ship HTML only).
  - htmlzip

python:
  install:
    # First the doc-build deps (sphinx + extensions, jupyter for nbsphinx,
    # plus matplotlib / xarray / h5netcdf for the notebooks).
    - requirements: doc/requirements.txt
    # Then the prepshot package itself so sphinx.ext.autodoc can import
    # prepshot.cli, prepshot._model.*, etc.
    - method: pip
      path: .
